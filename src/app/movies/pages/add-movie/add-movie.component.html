<form class="form border rounded p-3 mt-3 col-12 col-sm-6 col-md-6 mx-auto" (submit)="onSubmit()">
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input type="text" class="form-control" name="title" [(ngModel)]="movie.title">
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea class="form-control" rows="2" name="description" [(ngModel)]="movie.description"></textarea>
  </div>
  <div class="mb-3">
    <label class="form-label">Rating</label>
    <input type="text" class="form-control" name="rating" [(ngModel)]="movie.rating">
  </div>
  <div class="mb-3 form-check">
    <label class="form-check-label">Watched?</label>
    <input type="checkbox" class="form-check-input" name="watched" [(ngModel)]="movie.watched">
  </div>
  <div class="mb-3">
    <label class="form-label">Thumbnail url</label>
    <textarea class="form-control" rows="2" name="image_url" [(ngModel)]="movie.image_url"></textarea>
  </div>
  <button type="submit" class="btn btn-outline-primary me-2">Add</button>
  <button type="reset" class="btn btn-outline-secondary me-2" (click)="resetForm()">Reset</button>
  <button type="reset" class="btn btn-outline-danger" (click)="onClose()">Cancel</button>
</form>
