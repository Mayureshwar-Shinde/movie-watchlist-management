<div class="yt-card">
  <!-- Thumbnail -->
  <div class="yt-thumb">
    <img
      [src]="movie.image_url"
      [alt]="movie.title"
    />
    <span class="yt-badge">
      {{ movie.watched ? 'Watched' : 'New' }}
    </span>
  </div>

  <!-- Info -->
  <div class="yt-info">
    <h6 class="yt-title" title="{{ movie.title }}">
      {{ movie.title }}
    </h6>

    <p class="yt-desc">
      {{ movie.description }}
    </p>

    <div class="yt-meta">
      ⭐ {{ movie.rating }}
    </div>

    <!-- Actions -->
    <div class="yt-actions">
      <button class="btn btn-sm btn-outline-primary" (click)="onView()">View</button>
      <button class="btn btn-sm btn-outline-secondary" (click)="onEdit()">Edit</button>
      <button class="btn btn-sm btn-outline-danger" (click)="onDelete()">Delete</button>
    </div>
  </div>
</div>
