<div class="movie-card">
  <div class="movie-card-thumbnail" (click)="onView()">
    <img [src]="movie.thumbnail" [alt]="movie.title">
    <span class="movie-rating-badge">
      ⭐ {{ movie.rating }}
    </span>
    @if (movie.watched) { <span class="movie-status-badge">✓</span> }
  </div>
  
  <div class="movie-card-body mt-2">
    <h6 class="mb-1">{{ movie.title }}</h6>

    <div class="movie-desc text-muted">
      {{ movie.description }}
    </div>
  </div>
</div>
